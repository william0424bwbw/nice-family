<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NICE家族作業登記版 6.8 考試瘦身版</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --card-bg: #2d2d3a;
            --text-main: #ffffff;
            --text-sub: #b3b3cc;
            --level-0: #2a9d8f; 
            --level-1: #f4a261; 
            --level-2: #e63946; 
            --level-3: #7209b7; 
        }

        html, body {
            background-color: var(--bg-color);
            overflow-y: auto !important; 
            min-height: 100vh;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            font-size: 0.95rem;
        }

        .title-area {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            font-size: 2rem; 
            color: #4cc9f0;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(76, 201, 240, 0.3);
        }

        .subtitle {
            color: var(--text-sub);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        /* 模式切換頁籤 */
        .mode-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            background-color: #3b3b4f;
            color: #b3b3cc;
        }

        .tab-btn.active {
            background-color: #4cc9f0;
            color: #1e1e24;
            box-shadow: 0 0 15px rgba(76, 201, 240, 0.5);
        }

        /* 頂部工具列 */
        .top-tools {
            position: absolute;
            right: 10px;
            top: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-clear-all {
            background-color: #e63946; color: white; border: none; padding: 8px 12px;
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;
            font-size: 0.9rem; display: none; 
        }
        .btn-clear-all:hover { background-color: #b31f2a; }

        .parent-search-box {
            background: #3b3b4f; padding: 8px 12px; border-radius: 8px; display: flex; gap: 8px; align-items: center; border: 1px solid #4cc9f0;
        }
        .search-input { width: 90px; padding: 6px; font-size: 0.9rem; border-radius: 5px; border: none; text-align: center; font-weight: bold; }
        .btn-search { background-color: #4cc9f0; color: #1e1e24; border: none; padding: 6px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

        /* 控制台 */
        .control-panel {
            background: #252530; padding: 15px; border-radius: 12px; max-width: 850px;
            margin: 0 auto 25px auto; display: none; flex-wrap: wrap; gap: 12px;
            align-items: center; justify-content: center; border: 1px solid #3e3e50;
        }
        .select-style, .input-style, .btn-add { padding: 10px 16px; font-size: 1rem; border-radius: 8px; border: none; outline: none; font-weight: bold; }
        .select-style { background-color: #3b3b4f; color: white; cursor: pointer; }
        .input-style { background-color: #fff; color: #333; width: 180px; }
        .btn-add { background-color: #4cc9f0; color: #1e1e24; cursor: pointer; transition: all 0.2s; }
        .btn-add:hover { background-color: #4361ee; color: white; }

        .loading-hint { text-align: center; font-size: 1.3rem; color: #fccc52; margin: 20px; }

        /* 日常卡片網格 */
        .board-canvas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 20px; max-width: 1400px; margin: 0 auto; padding-bottom: 80px;
        }

        .homework-card {
            background: var(--card-bg); border-radius: 14px; padding: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); border: 2px solid #3e3e50; position: relative; transition: all 0.4s ease;
        }
        .homework-card.fade-out { transform: scale(0.8) translateY(-40px); opacity: 0; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 2px dashed #4e4e62; padding-bottom: 8px; }
        .card-title { font-size: 1.15rem; font-weight: bold; color: #fccc52; }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .btn-lock { background-color: #4361ee; color: white; border: none; padding: 4px 8px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; cursor: pointer; display: none; }
        .btn-lock.locked { background-color: #2a9d8f; }
        .btn-delete { background: none; border: none; color: #ef4444; font-size: 1.1rem; cursor: pointer; display: none; }

        /* 學生號碼矩陣設計 */
        .student-matrix { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .student-node {
            aspect-ratio: 1.2; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; color: white;
            background-color: var(--level-0); transition: all 0.15s ease; box-shadow: 0 3px 0 rgba(0,0,0,0.2);
        }
        .teacher-mode .student-node { cursor: pointer; } 
        
        /* 隱藏綠色名單的共用樣式 */
        .hide-green-mode .student-node[data-status="0"] { display: none; }

        .student-node.status-1 { background-color: var(--level-1); color: #1e1e24; }
        .student-node.status-2 { background-color: var(--level-2); font-size: 1.2rem; box-shadow: 0 0 8px rgba(230, 57, 70, 0.5); }
        .student-node.status-3 { background-color: var(--level-3); font-size: 1.25rem; animation: danger-blink 1s infinite alternate; }

        /* 📊 考試大表格「極致瘦身」全新架構 */
        .exam-mode-container {
            max-width: 900px; margin: 0 auto; background: var(--card-bg);
            padding: 20px; border-radius: 14px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); 
            border: 2px solid #4e4e62; display: none;
        }

        .exam-selector-zone {
            display: flex; justify-content: center; align-items: center; gap: 15px;
            margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px dashed #4e4e62;
        }

        .exam-view-title { font-size: 1.3rem; font-weight: bold; color: #fccc52; }

        /* 左右拆分雙大欄排版 */
        .exam-split-layout {
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px;
        }

        .exam-column-box {
            background: #252530; padding: 15px; border-radius: 10px; border: 1px solid #3e3e50;
        }

        .column-box-title {
            text-align: center; font-size: 1.1rem; font-weight: bold; color: #4cc9f0;
            margin-bottom: 12px; border-bottom: 1px solid #3e3e50; padding-bottom: 5px;
        }

        /* 考試專用大顆號碼矩陣 (3欄排版，字體放大) */
        .exam-matrix-adaptive {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
        }

        .exam-matrix-adaptive .student-node {
            aspect-ratio: 1.3; font-size: 1.2rem; /* 放大號碼球，大螢幕更好點 */
        }

        .btn-table-lock {
            background-color: #4361ee; color: white; border: none; padding: 8px 16px;
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem;
        }
        .btn-table-lock.locked { background-color: #2a9d8f; }

        .btn-single-del {
            background-color: #e63946; color: white; border: none; padding: 8px 12px;
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; display: none;
        }
        .teacher-mode .btn-single-del { display: inline-block; }

        @keyframes danger-blink {
            0% { opacity: 0.7; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1.05); box-shadow: 0 0 12px #7209b7; }
        }
    </style>
</head>
<body>

    <div class="title-area">
        <h1>📋 NICE家族作業登記版 6.8</h1>
        <div class="subtitle" id="viewModeHint">正在連線至雲端即時同步資料庫...</div>
        
        <div class="top-tools">
            <div class="parent-search-box">
                <input type="number" class="search-input" id="searchNo" placeholder="輸入座號" min="1" max="24">
                <button class="btn-search" onclick="searchStudentMissing()">🔍 查找欠交</button>
            </div>
            <button class="btn-clear-all" id="clearAllBtn" onclick="triggerClear()">🧹 清空日常作業</button>
        </div>
    </div>

    <!-- 雙模式切換按鈕 -->
    <div class="mode-tabs">
        <button class="tab-btn active" id="tabDaily" onclick="switchMode('daily')">📁 日常作業消消樂</button>
        <button class="tab-btn" id="tabExam" onclick="switchMode('exam')">📊 學期考試大標靶</button>
    </div>

    <!-- 控制台 A：日常作業 -->
    <div class="control-panel" id="controlPanelDaily">
        <select class="select-style" id="taskSelect" onchange="toggleCustomInput()">
            <option value="">-- 請選擇欲掛上的日常作業 --</option>
            <option value="國習">國習</option>
            <option value="預習本">預習本</option>
            <option value="圈詞">圈詞</option>
            <option value="甲本">甲本</option>
            <option value="乙本">乙本</option>
            <option value="聽寫">聽寫</option>
            <option value="字音字形">字音字形</option>
            <option value="默寫">默寫</option>
            <option value="數習">數習</option>
            <option value="數重">數重</option>
            <option value="數作">數作</option>
            <option value="數課">數課</option>
            <option value="CUSTOM">💡 自行輸入新作業</option>
        </select>
        <input type="text" class="input-style" id="customInput" placeholder="請打上新作業名稱" style="display:none;">
        <button class="btn-add" onclick="createNewCard()">＋ 掛上登記板</button>
    </div>

    <!-- 控制台 B：學期考試 -->
    <div class="control-panel" id="controlPanelExam">
        <select class="select-style" id="examSubject">
            <option value="國語">國語</option>
            <option value="數學">數學</option>
            <option value="其他">其他</option>
        </select>
        <input type="text" class="input-style" id="examUnitInput" placeholder="輸入單元名稱 (如: ch1)">
        <button class="btn-add" onclick="addNewExamColumn()">＋ 新增學期考試項目</button>
    </div>

    <div class="loading-hint" id="loadingHint">⏳ 雲端資料同步中，請稍候...</div>
    
    <!-- 模式 A：日常卡片畫布 -->
    <div class="board-canvas" id="boardCanvas"></div>

    <!-- 📊 模式 B：修復優化後的學期考試「防滑瘦身」看板 -->
    <div class="exam-mode-container" id="examTableContainer">
        <div class="exam-selector-zone">
            <span class="exam-view-title">🔍 請選擇考試項目：</span>
            <select class="select-style" id="examActiveSelect" onchange="renderExamTable()" style="min-width: 200px;">
                <!-- 動態注入考試科目 -->
            </select>
            <!-- 大表格專屬鎖定按鈕 -->
            <button class="btn-table-lock" id="btnTableLock" onclick="toggleTableLock()">🔒 鎖定黑板 (隱藏完成)</button>
            <button class="btn-single-del" id="btnSingleDel" onclick="triggerDeleteSingleExam()">🗑️ 刪除此科</button>
        </div>

        <!-- 拆分排版：1-12號一邊，13-24號一邊，一頁看全班 -->
        <div class="exam-split-layout" id="examSplitLayout">
            <!-- 左大欄：前段班 -->
            <div class="exam-column-box">
                <div class="column-box-title">01 ~ 12 號</div>
                <div class="exam-matrix-adaptive" id="examMatrixLeft"></div>
            </div>
            <!-- 右大欄：後段班 -->
            <div class="exam-column-box">
                <div class="column-box-title">13 ~ 24 號</div>
                <div class="exam-matrix-adaptive" id="examMatrixRight"></div>
            </div>
        </div>
    </div>

    <script>
        const cloudUrl = "https://script.google.com/macros/s/AKfycby60_GyNszlRXQyrJSgvi_zxx4G9swTuDj_jUQeLABa68kwz1R6ag9dWRQHyaW-S2sE/exec";
        const totalStudents = 24;
        let activeCardsData = []; 
        let examRecordsData = [];
        let isTeacher = false;
        let currentMode = 'daily';
        let isTableLocked = false; // 考試大表格預設不鎖定

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'teacher') {
                isTeacher = true;
                updateControlPanelVisibility();
                document.getElementById('clearAllBtn').style.display = 'block';
                document.getElementById('viewModeHint').textContent = '🔒 大熊老師管理模式（修改將即時同步雲端）';
                document.body.classList.add('teacher-mode');
            } else {
                document.getElementById('viewModeHint').textContent = '👁️ 家長/學生即時查閱看板（每 10 秒自動刷新）';
                setInterval(fetchCloudData, 10000); 
            }
            fetchCloudData();
        };

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tabDaily').classList.remove('active');
            document.getElementById('tabExam').classList.remove('active');
            const clearBtn = document.getElementById('clearAllBtn');

            if (mode === 'daily') {
                document.getElementById('tabDaily').classList.add('active');
                document.getElementById('boardCanvas').style.display = 'grid';
                document.getElementById('examTableContainer').style.display = 'none';
                clearBtn.textContent = "🧹 清空日常作業";
                clearBtn.style.backgroundColor = "#e63946";
            } else {
                document.getElementById('tabExam').classList.add('active');
                document.getElementById('boardCanvas').style.display = 'none';
                document.getElementById('examTableContainer').style.display = 'block';
                clearBtn.textContent = "🧹 清空學期考試";
                clearBtn.style.backgroundColor = "#7209b7";
            }
            updateControlPanelVisibility();
        }

        function updateControlPanelVisibility() {
            if (!isTeacher) return;
            document.getElementById('controlPanelDaily').style.display = (currentMode === 'daily') ? 'flex' : 'none';
            document.getElementById('controlPanelExam').style.display = (currentMode === 'daily') ? 'none' : 'flex';
        }

        function fetchCloudData() {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);

            fetch(cloudUrl, { signal: controller.signal })
            .then(res => res.json())
            .then(data => {
                clearTimeout(timeoutId);
                document.getElementById('loadingHint').style.display = 'none';
                activeCardsData = data.daily || [];
                
                // 讀取並更新選單
                const prevSelected = document.getElementById('examActiveSelect').value;
                examRecordsData = data.exam || [];
                updateExamSelectOptions(prevSelected);

                renderBoard();
                renderExamTable();
            }).catch(err => {
                clearTimeout(timeoutId);
                document.getElementById('loadingHint').innerHTML = "⚠️ 提示：目前處於離線快打模式。";
                renderBoard();
                renderExamTable();
            });
        }

        function updateExamSelectOptions(prevSelected) {
            const select = document.getElementById('examActiveSelect');
            select.innerHTML = "";
            if (examRecordsData.length === 0) {
                select.innerHTML = "<option value=''>-- 目前尚無考試項目 --</option>";
                return;
            }
            examRecordsData.forEach(e => {
                const opt = document.createElement('option');
                opt.value = e.examName;
                opt.textContent = e.examName;
                select.appendChild(opt);
            });
            if (prevSelected && examRecordsData.some(e => e.examName === prevSelected)) {
                select.value = prevSelected;
            }
        }

        function pushToCloud(payload) {
            fetch(cloudUrl, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        }

        // --- 模式 A：日常作業卡片 ---
        function renderBoard() {
            const canvas = document.getElementById('boardCanvas');
            canvas.innerHTML = ""; 
            activeCardsData.forEach(cardData => {
                renderCard(cardData.fullTitle, cardData.statusArray, cardData.isLocked);
            });
        }

        function renderCard(fullTitle, statusArray, isCardLocked) {
            const canvas = document.getElementById('boardCanvas');
            const card = document.createElement('div');
            card.className = 'homework-card';
            if (isCardLocked || !isTeacher) card.classList.add('hide-green-mode');

            const header = document.createElement('div');
            header.className = 'card-header';
            const title = document.createElement('div');
            title.className = 'card-title';
            title.textContent = fullTitle;

            const actionsWrapper = document.createElement('div');
            actionsWrapper.className = 'header-actions';

            const lockBtn = document.createElement('button');
            lockBtn.className = 'btn-lock';
            lockBtn.textContent = isCardLocked ? '🔓 解鎖' : '🔒 鎖定';
            if (isCardLocked) lockBtn.classList.add('locked');
            if (isTeacher) lockBtn.style.display = 'block';
            
            lockBtn.onclick = () => {
                const cardIndex = activeCardsData.findIndex(c => c.fullTitle === fullTitle);
                if (cardIndex !== -1) {
                    const nextLockState = !activeCardsData[cardIndex].isLocked;
                    activeCardsData[cardIndex].isLocked = nextLockState;
                    pushToCloud({
                        action: "saveOrUpdate", fullTitle: fullTitle,
                        pureName: activeCardsData[cardIndex].pureName,
                        statusArray: activeCardsData[cardIndex].statusArray,
                        isLocked: nextLockState
                    });
                    renderBoard();
                }
            };

            const delBtn = document.createElement('button');
            delBtn.className = 'btn-delete'; delBtn.innerHTML = '🗑️';
            if (isTeacher) delBtn.style.display = 'block';
            delBtn.onclick = () => removeCard(fullTitle);

            actionsWrapper.appendChild(lockBtn);
            actionsWrapper.appendChild(delBtn);
            header.appendChild(title);
            header.appendChild(actionsWrapper);
            card.appendChild(header);

            const matrix = document.createElement('div');
            matrix.className = 'student-matrix';

            for (let s = 1; s <= totalStudents; s++) {
                const btn = document.createElement('button');
                btn.className = 'student-node'; btn.textContent = s;
                const currentStatus = statusArray[s] || 0;
                btn.dataset.status = currentStatus;
                if (currentStatus > 0) btn.classList.add(`status-${currentStatus}`);

                if (isTeacher) {
                    btn.onclick = () => {
                        if (card.classList.contains('hide-green-mode') && !btn.classList.contains('status-1') && !btn.classList.contains('status-2') && !btn.classList.contains('status-3')) return;
                        let status = (parseInt(btn.dataset.status) + 1) % 4;
                        btn.dataset.status = status;

                        const cardIndex = activeCardsData.findIndex(c => c.fullTitle === fullTitle);
                        if (cardIndex !== -1) {
                            activeCardsData[cardIndex].statusArray[s] = status;
                            pushToCloud({
                                action: "saveOrUpdate", fullTitle: fullTitle,
                                pureName: activeCardsData[cardIndex].pureName,
                                statusArray: activeCardsData[cardIndex].statusArray,
                                isLocked: activeCardsData[cardIndex].isLocked
                            });
                            checkCardCompletion(cardIndex);
                        }
                        btn.className = 'student-node';
                        if (status > 0) btn.classList.add(`status-${status}`);
                    };
                }
                matrix.appendChild(btn);
            }
            card.appendChild(matrix);
            canvas.appendChild(card);
        }

        // --- 📊 模式 B：極致防滑瘦身大表格渲染 ---
        function renderExamTable() {
            const leftMatrix = document.getElementById('examMatrixLeft');
            const rightMatrix = document.getElementById('examMatrixRight');
            const layoutBox = document.getElementById('examSplitLayout');
            
            leftMatrix.innerHTML = "";
            rightMatrix.innerHTML = "";

            const activeExamName = document.getElementById('examActiveSelect').value;
            if (!activeExamName) return;

            const examData = examRecordsData.find(e => e.examName === activeExamName);
            const statusArray = examData ? examData.statusArray : Array(totalStudents + 1).fill(0);

            // 根據鎖定狀態或家長唯讀模式決定是否隱藏綠色
            if (isTableLocked || !isTeacher) {
                layoutBox.classList.add('hide-green-mode');
            } else {
                layoutBox.classList.add('hide-green-mode'); // 預設家長端完全隱藏
                if(isTeacher) layoutBox.classList.remove('hide-green-mode'); // 老師沒鎖定時展開
            }

            // 分流：1~24號拆成兩邊
            for (let s = 1; s <= totalStudents; s++) {
                const btn = document.createElement('button');
                btn.className = 'student-node';
                btn.textContent = String(s).padStart(2, '0'); // 補零視覺更整齊
                
                const currentStatus = statusArray[s] || 0;
                btn.dataset.status = currentStatus;
                if (currentStatus > 0) btn.classList.add(`status-${currentStatus}`);

                if (isTeacher) {
                    btn.onclick = () => {
                        if (layoutBox.classList.contains('hide-green-mode') && !btn.classList.contains('status-1') && !btn.classList.contains('status-2') && !btn.classList.contains('status-3')) return;
                        let status = (parseInt(btn.dataset.status) + 1) % 4;
                        btn.dataset.status = status;

                        const eIdx = examRecordsData.findIndex(e => e.examName === activeExamName);
                        if (eIdx !== -1) {
                            examRecordsData[eIdx].statusArray[s] = status;
                            pushToCloud({
                                action: "saveExam",
                                examName: activeExamName,
                                statusArray: examRecordsData[eIdx].statusArray
                            });
                        }
                        btn.className = 'student-node';
                        if (status > 0) btn.classList.add(`status-${status}`);
                    };
                }

                // 1-12放左邊，13-24放右邊
                if (s <= 12) {
                    leftMatrix.appendChild(btn);
                } else {
                    rightMatrix.appendChild(btn);
                }
            }
        }

        // 大表格鎖定切換
        function toggleTableLock() {
            isTableLocked = !isTableLocked;
            const btn = document.getElementById('btnTableLock');
            if (isTableLocked) {
                btn.textContent = "🔓 解鎖表格 (顯示全班)";
                btn.classList.add('locked');
            } else {
                btn.textContent = "🔒 鎖定表格 (隱藏完成)";
                btn.classList.remove('locked');
            }
            renderExamTable();
        }

        function createNewCard() {
            if (!isTeacher) return;
            const select = document.getElementById('taskSelect');
            const customInput = document.getElementById('customInput');
            let pureTaskName = (select.value === "CUSTOM") ? customInput.value.trim() : select.value;

            if (!pureTaskName) { alert("請先選擇或輸入作業名稱喔！"); return; }
            const today = new Date();
            const fullTitle = `${pureTaskName} ${today.getMonth() + 1}/${today.getDate()}`;

            if (activeCardsData.some(c => c.fullTitle === fullTitle)) { alert("今天已有此作業項目囉！"); return; }

            let inheritedStatus = Array(totalStudents + 1).fill(0); 
            activeCardsData.push({ fullTitle: fullTitle, pureName: pureTaskName, statusArray: inheritedStatus, isLocked: false });
            renderBoard();
            pushToCloud({ action: "saveOrUpdate", fullTitle: fullTitle, pureName: pureTaskName, statusArray: inheritedStatus, isLocked: false });

            select.value = ""; customInput.value = ""; customInput.style.display = "none";
        }

        function addNewExamColumn() {
            if (!isTeacher) return;
            const subject = document.getElementById('examSubject').value;
            const unit = document.getElementById('examUnitInput').value.trim();

            if (!unit) { alert("請填寫單元名稱！"); return; }
            const fullExamName = `${subject}-${unit}`;

            if (examRecordsData.some(e => e.examName === fullExamName)) { alert("已有此考試項目！"); return; }

            const initialStatus = Array(totalStudents + 1).fill(0);
            examRecordsData.push({ examName: fullExamName, statusArray: initialStatus });
            
            updateExamSelectOptions(fullExamName);
            renderExamTable();

            pushToCloud({ action: "saveExam", examName: fullExamName, statusArray: initialStatus });
            document.getElementById('examUnitInput').value = "";
        }

        function triggerDeleteSingleExam() {
            const activeExamName = document.getElementById('examActiveSelect').value;
            if (!activeExamName) return;
            if (confirm(`確定要徹底刪除「${activeExamName}」這欄考試項目嗎？`)) {
                examRecordsData = examRecordsData.filter(e => e.examName !== activeExamName);
                updateExamSelectOptions("");
                renderExamTable();
                pushToCloud({ action: "deleteExam", examName: activeExamName });
            }
        }

        function triggerClear() {
            if (currentMode === 'daily') {
                if(confirm("確定要清空目前大螢幕上「所有日常作業小卡」嗎？")) {
                    document.getElementById('boardCanvas').innerHTML = ""; activeCardsData = [];
                    pushToCloud({ action: "clearDaily" }); 
                }
            } else {
                if(confirm("⚠ 注意：確定要將一整學期累積的「所有考試項目」全部清空重置嗎？")) {
                    examRecordsData = []; updateExamSelectOptions(""); renderExamTable();
                    pushToCloud({ action: "clearExam" }); 
                }
            }
        }

        function searchStudentMissing() {
            const inputEl = document.getElementById('searchNo');
            const seatNo = parseInt(inputEl.value);
            if (isNaN(seatNo) || seatNo < 1 || seatNo > totalStudents) { alert("請輸入正確座號（1 ~ 24）"); return; }

            let dailyMissing = []; let examMissing = [];
            activeCardsData.forEach(card => { if (card.statusArray[seatNo] > 0) dailyMissing.push(`📌 ${card.fullTitle}`); });
            examRecordsData.forEach(exam => {
                if (exam.statusArray[seatNo] > 0) {
                    let levelText = (exam.statusArray[seatNo] === 1) ? "(未補考)" : (exam.statusArray[seatNo] === 2) ? "(延遲)" : "(⚠️釘子戶)";
                    examMissing.push(`📝 ${exam.examName} ${levelText}`);
                }
            });

            if (dailyMissing.length === 0 && examMissing.length === 0) {
                alert(`🎉 恭喜！【 ${seatNo} 號】目前全部過關！`);
            } else {
                let report = `📋 【 ${seatNo} 號】未完成訂正報告：\n`;
                if (dailyMissing.length > 0) report += `\n【📁 日常作業類】\n${dailyMissing.join('\n')}\n`;
                if (examMissing.length > 0) report += `\n【📊 學期考試類】\n${examMissing.join('\n')}\n`;
                alert(report);
            }
        }

        function toggleCustomInput() {
            const select = document.getElementById('taskSelect');
            const customInput = document.getElementById('customInput');
            customInput.style.display = (select.value === "CUSTOM") ? "inline-block" : "none";
            if (select.value === "CUSTOM") customInput.focus();
        }

        function checkCardCompletion(cardIndex) {
            const cardData = activeCardsData[cardIndex]; if (!cardData) return;
            const isAllGreen = cardData.statusArray.slice(1, totalStudents + 1).every(status => status === 0);
            if (isAllGreen) {
                const targetTitle = cardData.fullTitle;
                const cardElement = document.getElementById(`card_${targetTitle}`);
                if (cardElement) {
                    cardElement.classList.add('fade-out');
                    setTimeout(() => {
                        cardElement.remove();
                        activeCardsData = activeCardsData.filter(item => item.fullTitle !== targetTitle);
                        pushToCloud({ action: "delete", fullTitle: targetTitle }); 
                    }, 400);
                }
            }
        }

        function removeCard(fullTitle) {
            if(confirm(`確定要取下「${fullTitle}」嗎？`)) {
                const card = document.getElementById(`card_${fullTitle}`); if (card) card.remove();
                activeCardsData = activeCardsData.filter(item => item.fullTitle !== fullTitle);
                pushToCloud({ action: "delete", fullTitle: fullTitle });
            }
        }
    </script>
</body>
</html>
