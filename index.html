<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NICE家族即時親師數位看板 8.5 實戰修羅版</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --card-bg: #2d2d3a;
            --text-main: #ffffff;
            --text-sub: #b3b3cc;
            --level-0: #2a9d8f; 
            --level-1: #f4a261; 
            --level-2: #e63946; 
            --level-3: #7209b7; 
            
            /* 科目直覺反射配色（低飽和質感，不傷眼睛） */
            --subject-chinese: #4cc9f0;  /* 語文類：溫柔文青藍 */
            --subject-math: #2a9d8f;     /* 數學類：活力翡翠綠 */
            --subject-exam: #a14bf6;     /* 考試類：神祕科技紫 */
            --subject-custom: #fccc52;   /* 客製類：經典亮黃色 */
        }

        html, body {
            background-color: var(--bg-color);
            background-image: url('bg.jpg'); /* 自動嵌入老師上傳的 LOGO 背景 */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow-y: auto !important; 
            min-height: 100vh;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            font-size: 0.95rem;
            user-select: none;
            background-color: rgba(30, 30, 36, 0.88); /* 讓背景 LOGO 完美墊底不搶主視覺 */
            background-blend-mode: multiply;
        }

        .title-area { position: relative; max-width: 1200px; margin: 0 auto; text-align: center; }
        h1 { font-size: 2rem; color: #4cc9f0; margin-bottom: 5px; text-shadow: 0 0 10px rgba(76, 201, 240, 0.3); }
        .subtitle { color: var(--text-sub); margin-bottom: 20px; font-size: 0.9rem; }

        .mode-tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 22px; font-size: 1.05rem; font-weight: bold; border: none; border-radius: 30px; cursor: pointer; transition: 0.3s; background-color: #3b3b4f; color: #b3b3cc; }
        .tab-btn.active { background-color: #4cc9f0; color: #1e1e24; box-shadow: 0 0 15px rgba(76, 201, 240, 0.5); }

        .top-tools { position: absolute; right: 10px; top: 15px; display: flex; gap: 10px; align-items: center; }
        .btn-clear-all { background-color: #e63946; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.9rem; display: none; }
        .parent-search-box { background: #3b3b4f; padding: 8px 12px; border-radius: 8px; display: flex; gap: 8px; align-items: center; border: 1px solid #4cc9f0; }
        .search-input { width: 90px; padding: 6px; font-size: 0.9rem; border-radius: 5px; border: none; text-align: center; font-weight: bold; }
        .btn-search { background-color: #4cc9f0; color: #1e1e24; border: none; padding: 6px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        
        /* 🆕 兩大超級按鈕：同步、一鍵匯出總表 */
        .btn-sync-cloud { background-color: #2a9d8f; color: white; border: none; padding: 8px 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; display: none; box-shadow: 0 0 10px rgba(42,157,143,0.4); }
        .btn-export-all { background-color: #fccc52; color: #1e1e24; border: none; padding: 8px 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; box-shadow: 0 0 10px rgba(252,204,82,0.4); }

        /* 控制台 */
        .control-panel { background: #252530; padding: 15px; border-radius: 12px; max-width: 850px; margin: 0 auto 25px auto; display: none; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: center; border: 1px solid #3e3e50; }
        .select-style, .input-style, .btn-add { padding: 10px 16px; font-size: 1rem; border-radius: 8px; border: none; outline: none; font-weight: bold; }
        .select-style { background-color: #3b3b4f; color: white; cursor: pointer; }
        .input-style { background-color: #fff; color: #333; width: 180px; }
        .btn-add { background-color: #4cc9f0; color: #1e1e24; cursor: pointer; transition: all 0.2s; font-weight: bold; }

        /* 畫布網格 */
        .board-canvas { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; padding-bottom: 80px; }
        
        /* 💥 卡片與直覺科目配色大腦 */
        .homework-card { background: var(--card-bg); border-radius: 14px; padding: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); border: 2px solid #3e3e50; position: relative; transition: all 0.4s ease; }
        .homework-card.fade-out { transform: scale(0.8) translateY(-40px); opacity: 0; }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 2px dashed #4e4e62; padding-bottom: 8px; }
        .card-title { font-size: 1.15rem; font-weight: bold; color: var(--subject-custom); }
        
        /* 科目專屬色彩（看一眼標題直接反射！） */
        .card-chinese .card-title { color: var(--subject-chinese); }
        .card-math .card-title { color: var(--subject-math); }
        .card-exam .card-title { color: var(--subject-exam); }
        
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .btn-lock { background-color: #4361ee; color: white; border: none; padding: 4px 8px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; cursor: pointer; display: none; }
        .btn-lock.locked { background-color: #2a9d8f; }
        .btn-delete { background: none; border: none; color: #ef4444; font-size: 1.1rem; cursor: pointer; display: none; }

        .student-matrix { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .student-node { aspect-ratio: 1.2; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; color: white; background-color: var(--level-0); transition: all 0.15s ease; box-shadow: 0 3px 0 rgba(0,0,0,0.2); }
        .teacher-mode .student-node { cursor: pointer; } 
        .hide-green-mode .student-node[data-status="0"] { display: none; }

        .student-node.status-1 { background-color: var(--level-1); color: #1e1e24; }
        .student-node.status-2 { background-color: var(--level-2); font-size: 1.2rem; box-shadow: 0 0 8px rgba(230, 57, 70, 0.5); }
        
        /* 🔮 終極大釘子戶：霓虹圓形閃爍特效（排版絕對不歪！） */
        .student-node.status-3 { 
            background-color: var(--level-3); 
            font-size: 1.25rem; 
            border-radius: 50% !important; /* 變圓形！ */
            animation: neon-shining 0.6s infinite alternate; /* 瘋狂閃爍 */
        }

        @keyframes neon-shining { 
            0% { opacity: 0.6; box-shadow: 0 0 4px #7209b7, inset 0 0 2px #fff; } 
            100% { opacity: 1; box-shadow: 0 0 16px #9d4edd, inset 0 0 8px #fff; transform: scale(1.05); } 
        }
        @keyframes explode-effect { 0% { transform: scale(1); background-color: #fff; box-shadow: 0 0 20px #fff; } 50% { transform: scale(1.4); background-color: #fccc52; box-shadow: 0 0 40px #fccc52; } 100% { transform: scale(1); background-color: var(--level-0); } }
        .exploding { animation: explode-effect 0.4s ease-out !important; }

        /* 相簿 */
        .photo-gallery-container { max-width: 1000px; margin: 0 auto; display: none; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding-bottom: 80px; }
        .photo-album-card { background: #252530; border-radius: 14px; border: 2px solid #3e3e50; overflow: hidden; box-shadow: 0 8px 15px rgba(0,0,0,0.2); transition: all 0.3s; text-decoration: none; color: white; display: flex; flex-direction: column; position: relative; }
        .photo-album-card:hover { transform: translateY(-5px); border-color: #4cc9f0; box-shadow: 0 12px 25px rgba(76,201,240,0.3); }
        .album-icon-zone { background: #313143; height: 130px; display: flex; justify-content: center; align-items: center; font-size: 4rem; }
        .album-info-zone { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .album-name { font-size: 1.15rem; font-weight: bold; color: #4cc9f0; margin-bottom: 8px; line-height: 1.4; }
        .album-desc { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 12px; }
        .album-action-hint { font-size: 0.9rem; color: #fccc52; font-weight: bold; text-align: right; }
        .btn-del-photo { position: absolute; top: 10px; right: 10px; background: rgba(230,57,70,0.8); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-weight: bold; cursor: pointer; display: none; z-index: 10; }
        .teacher-mode .btn-del-photo { display: block; }

        .loading-hint { text-align: center; font-size: 1.3rem; color: #fccc52; margin: 20px; }
    </style>
</head>
<body>

    <div class="title-area">
        <h1>📋 NICE家族即時親師數位看板 8.5</h1>
        <div class="subtitle" id="viewModeHint">正在連線至雲端即時同步資料庫...</div>
        
        <div class="top-tools">
            <button class="btn-sync-cloud" id="syncCloudBtn" onclick="fetchCloudData(true)">💾 同步並強制檢查</button>
            <button class="btn-export-all" onclick="exportDebtReport()">📊 複製未交總表</button>
            <div class="parent-search-box" id="searchBoxZone">
                <input type="number" class="search-input" id="searchNo" placeholder="座號" min="1" max="24">
                <button class="btn-search" onclick="searchStudentMissing()">🔍 查缺交</button>
            </div>
            <button class="btn-clear-all" id="clearAllBtn" onclick="triggerClear()">🧹 清空日常作業</button>
        </div>
    </div>

    <div class="mode-tabs">
        <button class="tab-btn active" id="tabDaily" onclick="switchMode('daily')">📁 日常作業消消樂</button>
        <button class="tab-btn" id="tabExam" onclick="switchMode('exam')">📊 學期考試大標靶</button>
        <button class="tab-btn" id="tabPhotos" onclick="switchMode('photos')">📸 NICE家族生活剪影</button>
    </div>

    <!-- 控制台 A：日常作業 -->
    <div class="control-panel" id="controlPanelDaily">
        <select class="select-style" id="taskSelect" onchange="toggleCustomInput()">
            <option value="">-- 請選擇日常作業 --</option>
            <option value="國習">國習</option><option value="預習本">預習本</option><option value="圈詞">圈詞</option><option value="甲本">甲本</option><option value="乙本">乙本</option><option value="聽寫">聽寫</option><option value="字音字形">字音字形</option><option value="數習">數習</option><option value="數重">數重</option><option value="數作">數作</option>
            <option value="CUSTOM">💡 自行輸入新作業</option>
        </select>
        <input type="text" class="input-style" id="customInput" placeholder="請打上新作業名稱" style="display:none;">
        <button class="btn-add" onclick="createNewCard()">＋ 掛上登記板</button>
    </div>

    <!-- 控制台 B：學期考試 -->
    <div class="control-panel" id="controlPanelExam">
        <select class="select-style" id="examSubject">
            <option value="國語">國語</option><option value="數學">數學</option><option value="社會">社會</option><option value="自然">自然</option><option value="其他">其他</option>
        </select>
        <input type="text" class="input-style" id="examUnitInput" placeholder="單元 (例如: 第一單元)">
        <button class="btn-add" onclick="addNewExamCard()">＋ 掛上考試卡片</button>
    </div>

    <!-- 控制台 C：生活相簿網頁直加（大熊老師專用！） -->
    <div class="control-panel" id="controlPanelPhotos">
        <select class="select-style" id="photoIconSelect">
            <option value="🎒">🎒 學校生活</option><option value="🏐">🏐 體育球賽</option><option value="👣">👣 戶外健行</option><option value="🌟">🌟 精采表演</option><option value="🎨">🎨 美術創作</option><option value="📸">📸 其他隨拍</option>
        </select>
        <input type="text" class="input-style" id="photoNameInput" placeholder="輸入相簿主標題">
        <input type="text" class="input-style" id="photoDescInput" placeholder="輸入一兩句相簿簡介" style="width:200px;">
        <input type="text" class="input-style" id="photoUrlInput" placeholder="貼上 Google 相簿連結" style="width:200px;">
        <button class="btn-add" onclick="addNewPhotoAlbumCloud()">＋ 立即發布相簿</button>
    </div>

    <div class="loading-hint" id="loadingHint">⏳ 雲端資料同步中，請稍候...</div>
    
    <!-- 三大區塊看板（考試全面卡片化） -->
    <div class="board-canvas" id="boardCanvas"></div>
    <div class="board-canvas" id="examCanvas" style="display:none;"></div>
    <div class="photo-gallery-container" id="photoGalleryContainer"></div>

    <script>
        // ⚠️ 記得放上大熊老師專屬的 Apps Script 部署網址
        const cloudUrl = "https://script.google.com/macros/s/AKfycby60_GyNszlRXQyrJSgvi_zxx4G9swTuDj_jUQeLABa68kwz1R6ag9dWRQHyaW-S2sE/exec";
        const totalStudents = 24;
        let activeCardsData = []; let examRecordsData = []; let photoRecordsData = [];
        let isTeacher = false; let currentMode = 'daily';

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'teacher') {
                isTeacher = true; updateControlPanelVisibility();
                document.getElementById('clearAllBtn').style.display = 'block';
                document.getElementById('syncCloudBtn').style.display = 'block';
                document.getElementById('viewModeHint').textContent = '🔒 大熊老師管理模式（按【同步】按鈕融合雙向進度）';
                document.body.classList.add('teacher-mode');
            } else {
                document.getElementById('viewModeHint').textContent = '👁️ 家長/學生即時查閱看板（每 10 秒自動刷新）';
                setInterval(() => fetchCloudData(false), 10000); 
            }
            fetchCloudData(false);
        };

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tabDaily').classList.remove('active'); document.getElementById('tabExam').classList.remove('active'); document.getElementById('tabPhotos').classList.remove('active');
            const clearBtn = document.getElementById('clearAllBtn'); const searchBox = document.getElementById('searchBoxZone');
            
            document.getElementById('boardCanvas').style.display = 'none'; document.getElementById('examCanvas').style.display = 'none'; document.getElementById('photoGalleryContainer').style.display = 'none';

            if (mode === 'daily') {
                document.getElementById('tabDaily').classList.add('active'); document.getElementById('boardCanvas').style.display = 'grid';
                searchBox.style.display = 'flex'; clearBtn.style.display = isTeacher ? 'block' : 'none';
                clearBtn.textContent = "🧹 清空日常作業"; clearBtn.style.backgroundColor = "#e63946";
            } else if (mode === 'exam') {
                document.getElementById('tabExam').classList.add('active'); document.getElementById('examCanvas').style.display = 'grid';
                searchBox.style.display = 'flex'; clearBtn.style.display = isTeacher ? 'block' : 'none';
                clearBtn.textContent = "🧹 清空學期考試"; clearBtn.style.backgroundColor = "#7209b7";
            } else if (mode === 'photos') {
                document.getElementById('tabPhotos').classList.add('active'); document.getElementById('photoGalleryContainer').style.display = 'grid';
                searchBox.style.display = 'none'; clearBtn.style.display = 'none';
            }
            updateControlPanelVisibility();
        }

        function updateControlPanelVisibility() {
            if (!isTeacher) return;
            document.getElementById('controlPanelDaily').style.display = (currentMode === 'daily') ? 'flex' : 'none';
            document.getElementById('controlPanelExam').style.display = (currentMode === 'exam') ? 'flex' : 'none';
            document.getElementById('controlPanelPhotos').style.display = (currentMode === 'photos') ? 'flex' : 'none';
        }

        // 🧠 強制雙向同步大腦：絕不蓋檔
        function fetchCloudData(isManualSync) {
            if(isManualSync) document.getElementById('loadingHint').style.display = 'block';
            fetch(cloudUrl).then(res => res.json()).then(data => {
                document.getElementById('loadingHint').style.display = 'none';
                activeCardsData = data.daily || [];
                examRecordsData = data.exam || [];
                photoRecordsData = data.photos || [];
                renderBoard(); renderExamBoard(); renderPhotoGallery();
                if(isManualSync) alert("🔄 雲端同步成功！已為您融合台上、台下的最新點擊狀態！");
            }).catch(err => { document.getElementById('loadingHint').innerHTML = "⚠️ 雲端同步失敗，請檢查網路。"; });
        }

        function pushToCloud(payload) { fetch(cloudUrl, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) }); }

        // 判定卡片科目專屬色彩大腦（藍/綠反射）
        function getSubjectClass(title) {
            if (title.includes("國") || title.includes("字") || title.includes("聽") || title.includes("圈") || title.includes("默") || title.includes("預")) return "card-chinese";
            if (title.includes("數")) return "card-math";
            return "";
        }

        function bindNodeEvents(btn, s, type, identifier) {
            if (!isTeacher) return;
            let touchTimeout; let isLongPress = false;
            const executeExplosion = () => {
                isLongPress = true; btn.className = 'student-node exploding';
                setTimeout(() => {
                    btn.dataset.status = 0; btn.className = 'student-node';
                    if (type === 'daily') {
                        const idx = activeCardsData.findIndex(c => c.fullTitle === identifier);
                        if (idx !== -1) { activeCardsData[idx].statusArray[s] = 0; syncDailyCard(idx); }
                    } else if (type === 'exam') {
                        const idx = examRecordsData.findIndex(e => e.examName === identifier);
                        if (idx !== -1) { examRecordsData[idx].statusArray[s] = 0; syncExamCard(idx); }
                    }
                }, 400);
            };
            btn.onmousedown = () => { isLongPress = false; touchTimeout = setTimeout(executeExplosion, 800); };
            btn.onmouseup = () => clearTimeout(touchTimeout); btn.onmouseleave = () => clearTimeout(touchTimeout);
            btn.ontouchstart = () => { isLongPress = false; touchTimeout = setTimeout(executeExplosion, 800); }; btn.ontouchend = () => clearTimeout(touchTimeout);

            btn.onclick = () => {
                if (isLongPress) { isLongPress = false; return; }
                const pNode = btn.parentNode.parentNode;
                if (pNode.classList.contains('hide-green-mode') && btn.dataset.status === "0") return;

                let status = (parseInt(btn.dataset.status) + 1) % 4; btn.dataset.status = status;
                if (type === 'daily') {
                    const idx = activeCardsData.findIndex(c => c.fullTitle === identifier);
                    if (idx !== -1) { activeCardsData[idx].statusArray[s] = status; syncDailyCard(idx); }
                } else if (type === 'exam') {
                    const idx = examRecordsData.findIndex(e => e.examName === identifier);
                    if (idx !== -1) { examRecordsData[idx].statusArray[s] = status; syncExamCard(idx); }
                }
                btn.className = 'student-node'; if (status > 0) btn.classList.add(`status-${status}`);
            };
        }

        function syncDailyCard(idx) { pushToCloud({ action: "saveOrUpdate", fullTitle: activeCardsData[idx].fullTitle, pureName: activeCardsData[idx].pureName, statusArray: activeCardsData[idx].statusArray, isLocked: activeCardsData[idx].isLocked }); checkCardCompletion(idx, 'daily'); }
        function syncExamCard(idx) { pushToCloud({ action: "saveExam", examName: examRecordsData[idx].examName, statusArray: examRecordsData[idx].statusArray }); checkCardCompletion(idx, 'exam'); }

        function renderBoard() {
            const canvas = document.getElementById('boardCanvas'); canvas.innerHTML = ""; 
            activeCardsData.forEach((cardData, idx) => {
                const card = document.createElement('div'); card.className = `homework-card ${getSubjectClass(cardData.fullTitle)}`; card.id = `card_daily_${cardData.fullTitle}`;
                if (cardData.isLocked || !isTeacher) card.classList.add('hide-green-mode');

                const header = document.createElement('div'); header.className = 'card-header';
                const title = document.createElement('div'); title.className = 'card-title'; title.textContent = cardData.fullTitle;
                const actions = document.createElement('div'); actions.className = 'header-actions';
                
                const lockBtn = document.createElement('button'); lockBtn.className = 'btn-lock'; lockBtn.textContent = cardData.isLocked ? '🔓 解鎖' : '🔒 鎖定';
                if (cardData.isLocked) lockBtn.classList.add('locked'); if (isTeacher) lockBtn.style.display = 'block';
                lockBtn.onclick = () => { cardData.isLocked = !cardData.isLocked; syncDailyCard(idx); renderBoard(); };

                const delBtn = document.createElement('button'); delBtn.className = 'btn-delete'; delBtn.innerHTML = '🗑️'; if (isTeacher) delBtn.style.display = 'block';
                delBtn.onclick = () => { if(confirm(`確定要取下「${cardData.fullTitle}」嗎？`)) { card.remove(); activeCardsData.splice(idx, 1); pushToCloud({ action: "delete", fullTitle: cardData.fullTitle }); } };

                actions.appendChild(lockBtn); actions.appendChild(delBtn); header.appendChild(title); header.appendChild(actions); card.appendChild(header);
                const matrix = document.createElement('div'); matrix.className = 'student-matrix';
                for (let s = 1; s <= totalStudents; s++) {
                    const btn = document.createElement('button'); btn.className = 'student-node'; btn.textContent = s;
                    const currentStatus = cardData.statusArray[s] || 0; btn.dataset.status = currentStatus; if (currentStatus > 0) btn.classList.add(`status-${currentStatus}`);
                    bindNodeEvents(btn, s, 'daily', cardData.fullTitle); matrix.appendChild(btn);
                }
                card.appendChild(matrix); canvas.appendChild(card);
            });
        }

        //  ✨ 新的程式碼：不管是誰看，考試卡片「預設一律開啟鎖定」，只顯示未過關的釘子戶！
function renderExamBoard() {
    const canvas = document.getElementById('examCanvas'); canvas.innerHTML = "";
    examRecordsData.forEach((examData, idx) => {
        const card = document.createElement('div'); card.className = 'homework-card exam-card'; card.id = `card_exam_${examData.examName}`;
        
        // 🎯 換成這行！這樣家長和學生一進來，綠色球會自動隱形，畫面瞬間清爽，一眼秒看誰沒補考！
        card.classList.add('hide-green-mode');

                const header = document.createElement('div'); header.className = 'card-header';
                const title = document.createElement('div'); title.className = 'card-title'; title.textContent = `📝 ${examData.examName}`;
                const actions = document.createElement('div'); actions.className = 'header-actions';

                const delBtn = document.createElement('button'); delBtn.className = 'btn-delete'; delBtn.innerHTML = '🗑️'; if (isTeacher) delBtn.style.display = 'block';
                delBtn.onclick = () => { if(confirm(`確定要下架「${examData.examName}」卡片嗎？`)) { card.remove(); examRecordsData.splice(idx, 1); pushToCloud({ action: "deleteExam", examName: examData.examName }); } };

                actions.appendChild(delBtn); header.appendChild(title); header.appendChild(actions); card.appendChild(header);
                const matrix = document.createElement('div'); matrix.className = 'student-matrix';
                for (let s = 1; s <= totalStudents; s++) {
                    const btn = document.createElement('button'); btn.className = 'student-node'; btn.textContent = String(s).padStart(2, '0');
                    const currentStatus = examData.statusArray[s] || 0; btn.dataset.status = currentStatus; if (currentStatus > 0) btn.classList.add(`status-${currentStatus}`);
                    bindNodeEvents(btn, s, 'exam', examData.examName); matrix.appendChild(btn);
                }
                card.appendChild(matrix); canvas.appendChild(card);
            });
        }

        function renderPhotoGallery() {
            const container = document.getElementById('photoGalleryContainer'); container.innerHTML = "";
            photoRecordsData.slice().reverse().forEach(p => {
                const card = document.createElement('div'); card.className = 'photo-album-card';
                const delBtn = document.createElement('button'); delBtn.className = 'btn-del-photo'; delBtn.textContent = '×';
                delBtn.onclick = (e) => { e.preventDefault(); e.stopPropagation(); if(confirm(`確定刪除「${p.name}」相簿？`)) { pushToCloud({ action: "deletePhoto", name: p.name }); setTimeout(fetchCloudData, 800); } };
                
                const a = document.createElement('a'); a.href = p.url; a.target = "_blank"; style = "text-decoration:none; color:white;";
                a.innerHTML = `<div class="album-icon-zone">${p.icon}</div>
                               <div class="album-info-zone">
                                   <div><div class="album-name">${p.name}</div><div class="album-desc">${p.desc}</div></div>
                                   <div class="album-action-hint">進入相簿觀看 ➜</div>
                               </div>`;
                card.appendChild(delBtn); card.appendChild(a); container.appendChild(card);
            });
        }

        function createNewCard() {
            if (!isTeacher) return; const select = document.getElementById('taskSelect'); const customInput = document.getElementById('customInput'); let pureTaskName = (select.value === "CUSTOM") ? customInput.value.trim() : select.value; if (!pureTaskName) return;
            const today = new Date(); const newFullTitle = `${pureTaskName} ${today.getMonth() + 1}/${today.getDate()}`;
            if (activeCardsData.some(c => c.fullTitle === newFullTitle)) { alert("防呆：今天已有同名作業！"); return; }
            let advancedStatus = Array(totalStudents + 1).fill(0); let oldCard = [...activeCardsData].reverse().find(c => c.pureName === pureTaskName);
            if (oldCard) { for (let s = 1; s <= totalStudents; s++) { let oldStatus = oldCard.statusArray[s] || 0; if (oldStatus === 1) advancedStatus[s] = 2; else if (oldStatus === 2 || oldStatus === 3) advancedStatus[s] = 3; } activeCardsData = activeCardsData.filter(c => c.fullTitle !== oldCard.fullTitle); pushToCloud({ action: "delete", fullTitle: oldCard.fullTitle }); }
            activeCardsData.push({ fullTitle: newFullTitle, pureName: pureTaskName, statusArray: advancedStatus, isLocked: false }); renderBoard(); pushToCloud({ action: "saveOrUpdate", fullTitle: newFullTitle, pureName: pureTaskName, statusArray: advancedStatus, isLocked: false });
            select.value = ""; customInput.value = ""; customInput.style.display = "none";
        }

        function addNewExamCard() {
            if (!isTeacher) return; const subj = document.getElementById('examSubject').value; const unit = document.getElementById('examUnitInput').value.trim(); if (!unit) return;
            const fullExamName = `${subj}-${unit}`; if (examRecordsData.some(e => e.examName === fullExamName)) { alert("已有此考試卡片！"); return; }
            const initialStatus = Array(totalStudents + 1).fill(0); examRecordsData.push({ examName: fullExamName, statusArray: initialStatus }); renderExamBoard();
            pushToCloud({ action: "saveExam", examName: fullExamName, statusArray: initialStatus }); document.getElementById('examUnitInput').value = "";
        }

        function addNewPhotoAlbumCloud() {
            if (!isTeacher) return;
            const url = document.getElementById('photoUrlInput').value.trim(); const icon = document.getElementById('photoIconSelect').value; const name = document.getElementById('photoNameInput').value.trim(); const desc = document.getElementById('photoDescInput').value.trim();
            if (!url || !name) return; pushToCloud({ action: "savePhoto", url: url, icon: icon, name: name, desc: desc });
            setTimeout(() => fetchCloudData(false), 1000);
            document.getElementById('photoUrlInput').value = ""; document.getElementById('photoNameInput').value = ""; document.getElementById('photoDescInput').value = "";
        }

        // 📊 核心：一鍵匯出全班未交總表（再也不用被小孩包圍！）
        function exportDebtReport() {
            let reportMap = {};
            for (let s = 1; s <= totalStudents; s++) { reportMap[s] = { daily: [], exam: [] }; }

            activeCardsData.forEach(c => { for (let s = 1; s <= totalStudents; s++) { if ((c.statusArray[s] || 0) > 0) reportMap[s].daily.push(c.fullTitle); } });
            examRecordsData.forEach(e => { for (let s = 1; s <= totalStudents; s++) { if ((e.statusArray[s] || 0) > 0) reportMap[s].exam.push(e.examName); } });

            let finalStr = `📋 NICE家族 欠交/補考 總追債報告\n(產出時間: ${new Date().toLocaleTimeString()})\n-------------------------\n`;
            let cleanCount = 0;

            for (let s = 1; s <= totalStudents; s++) {
                if (reportMap[s].daily.length === 0 && reportMap[s].exam.length === 0) {
                    cleanCount++; continue;
                }
                finalStr += `👤 ${String(s).padStart(2,'0')}號：\n`;
                if (reportMap[s].daily.length > 0) finalStr += `  📁 作業 -> ${reportMap[s].daily.join('、')}\n`;
                if (reportMap[s].exam.length > 0) finalStr += `  📝 補考 -> ${reportMap[s].exam.join('、')}\n`;
                finalStr += `\n`;
            }

            finalStr += `-------------------------\n🎉 目前共有 ${cleanCount} 位優秀天使全數過關！`;
            
            // 複製到剪貼簿並彈窗通知
            navigator.clipboard.writeText(finalStr).then(() => {
                alert("📊 全班債務總報告已成功複製到您的剪貼簿！\n您可以直接去 LINE 群組貼上，或是由小幫手抄去黑板喔！");
            });
        }

        function checkCardCompletion(idx, type) {
            if (type === 'daily') {
                const card = activeCardsData[idx]; if (!card) return;
                if (card.statusArray.slice(1, totalStudents + 1).every(s => s === 0)) {
                    const el = document.getElementById(`card_daily_${card.fullTitle}`); if (el) { el.classList.add('fade-out'); setTimeout(() => { el.remove(); activeCardsData = activeCardsData.filter(c => c.fullTitle !== card.fullTitle); pushToCloud({ action: "delete", fullTitle: card.fullTitle }); }, 400); }
                }
            } else {
                const exam = examRecordsData[idx]; if (!exam) return;
                if (exam.statusArray.slice(1, totalStudents + 1).every(s => s === 0)) {
                    const el = document.getElementById(`card_exam_${exam.examName}`); if (el) { el.classList.add('fade-out'); setTimeout(() => { el.remove(); examRecordsData = examRecordsData.filter(e => e.examName !== exam.examName); pushToCloud({ action: "deleteExam", examName: exam.examName }); }, 400); }
                }
            }
        }

        function triggerClear() {
            if (currentMode === 'daily') { if(confirm("確定清空日常作業？")) { document.getElementById('boardCanvas').innerHTML = ""; activeCardsData = []; pushToCloud({ action: "clearDaily" }); } }
            else { if(confirm("確定清空學期所有考試？")) { document.getElementById('examCanvas').innerHTML = ""; examRecordsData = []; pushToCloud({ action: "clearExam" }); } }
        }

        function searchStudentMissing() {
            const inputEl = document.getElementById('searchNo'); const seatNo = parseInt(inputEl.value); if (isNaN(seatNo) || seatNo < 1 || seatNo > totalStudents) return;
            let dailyMissing = []; let examMissing = [];
            activeCardsData.forEach(c => { if (c.statusArray[seatNo] > 0) dailyMissing.push(`📌 ${c.fullTitle}`); });
            examRecordsData.forEach(e => { if (e.statusArray[seatNo] > 0) examMissing.push(`📝 ${e.examName}`); });
            if (dailyMissing.length === 0 && examMissing.length === 0) { alert(`🎉 恭喜！【 ${seatNo} 號】目前全部過關！`); } 
            else { alert(`📋 【 ${seatNo} 號】未完成報告：\n\n【日常】\n${dailyMissing.join('\n') || '無'}\n\n【考試】\n${examMissing.join('\n') || '無'}`); }
        }

        function toggleCustomInput() { const select = document.getElementById('taskSelect'); const customInput = document.getElementById('customInput'); customInput.style.display = (select.value === "CUSTOM") ? "inline-block" : "none"; if (select.value === "CUSTOM") customInput.focus(); }
    </script>
</body>
</html>
