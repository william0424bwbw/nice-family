<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NICE家族即時親師數位看板 7.5</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --card-bg: #2d2d3a;
            --text-main: #ffffff;
            --text-sub: #b3b3cc;
            --level-0: #2a9d8f; 
            --level-1: #f4a261; 
            --level-2: #e63946; 
            --level-3: #7209b7; 
        }

        html, body {
            background-color: var(--bg-color);
            overflow-y: auto !important; 
            min-height: 100vh;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            font-size: 0.95rem;
            user-select: none;
        }

        .title-area {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            font-size: 2rem; 
            color: #4cc9f0;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(76, 201, 240, 0.3);
        }

        .subtitle {
            color: var(--text-sub);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        /* 模式切換頁籤：升級為三選單 */
        .mode-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 22px;
            font-size: 1.05rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            background-color: #3b3b4f;
            color: #b3b3cc;
        }

        .tab-btn.active {
            background-color: #4cc9f0;
            color: #1e1e24;
            box-shadow: 0 0 15px rgba(76, 201, 240, 0.5);
        }

        .top-tools {
            position: absolute;
            right: 10px;
            top: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-clear-all {
            background-color: #e63946; color: white; border: none; padding: 8px 12px;
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;
            font-size: 0.9rem; display: none; 
        }
        .btn-clear-all:hover { background-color: #b31f2a; }

        .parent-search-box {
            background: #3b3b4f; padding: 8px 12px; border-radius: 8px; display: flex; gap: 8px; align-items: center; border: 1px solid #4cc9f0;
        }
        .search-input { width: 90px; padding: 6px; font-size: 0.9rem; border-radius: 5px; border: none; text-align: center; font-weight: bold; }
        .btn-search { background-color: #4cc9f0; color: #1e1e24; border: none; padding: 6px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

        .control-panel {
            background: #252530; padding: 15px; border-radius: 12px; max-width: 850px;
            margin: 0 auto 25px auto; display: none; flex-wrap: wrap; gap: 12px;
            align-items: center; justify-content: center; border: 1px solid #3e3e50;
        }
        .select-style, .input-style, .btn-add { padding: 10px 16px; font-size: 1rem; border-radius: 8px; border: none; outline: none; font-weight: bold; }
        .select-style { background-color: #3b3b4f; color: white; cursor: pointer; }
        .input-style { background-color: #fff; color: #333; width: 180px; }
        .btn-add { background-color: #4cc9f0; color: #1e1e24; cursor: pointer; transition: all 0.2s; }

        /* 日常作業看板 */
        .board-canvas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 20px; max-width: 1400px; margin: 0 auto; padding-bottom: 80px;
        }

        .homework-card {
            background: var(--card-bg); border-radius: 14px; padding: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); border: 2px solid #3e3e50; position: relative; transition: all 0.4s ease;
        }
        .homework-card.fade-out { transform: scale(0.8) translateY(-40px); opacity: 0; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 2px dashed #4e4e62; padding-bottom: 8px; }
        .card-title { font-size: 1.15rem; font-weight: bold; color: #fccc52; }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .btn-lock { background-color: #4361ee; color: white; border: none; padding: 4px 8px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; cursor: pointer; display: none; }
        .btn-lock.locked { background-color: #2a9d8f; }
        .btn-delete { background: none; border: none; color: #ef4444; font-size: 1.1rem; cursor: pointer; display: none; }

        .student-matrix { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .student-node {
            aspect-ratio: 1.2; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; color: white;
            background-color: var(--level-0); transition: all 0.15s ease; box-shadow: 0 3px 0 rgba(0,0,0,0.2);
        }
        .teacher-mode .student-node { cursor: pointer; } 
        .hide-green-mode .student-node[data-status="0"] { display: none; }

        .student-node.status-1 { background-color: var(--level-1); color: #1e1e24; }
        .student-node.status-2 { background-color: var(--level-2); font-size: 1.2rem; box-shadow: 0 0 8px rgba(230, 57, 70, 0.5); }
        .student-node.status-3 { background-color: var(--level-3); font-size: 1.25rem; animation: danger-blink 1s infinite alternate; }

        /* 長按爆炸動畫 */
        @keyframes explode-effect {
            0% { transform: scale(1); background-color: #fff; box-shadow: 0 0 20px #fff; }
            50% { transform: scale(1.4); background-color: #fccc52; box-shadow: 0 0 40px #fccc52; }
            100% { transform: scale(1); background-color: var(--level-0); }
        }
        .exploding { animation: explode-effect 0.4s ease-out !important; }

        /* 考試大表格 */
        .exam-mode-container {
            max-width: 900px; margin: 0 auto; background: var(--card-bg);
            padding: 20px; border-radius: 14px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); 
            border: 2px solid #4e4e62; display: none;
        }
        .exam-selector-zone { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px dashed #4e4e62; }
        .exam-view-title { font-size: 1.3rem; font-weight: bold; color: #fccc52; }
        .exam-split-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .exam-column-box { background: #252530; padding: 15px; border-radius: 10px; border: 1px solid #3e3e50; }
        .column-box-title { text-align: center; font-size: 1.1rem; font-weight: bold; color: #4cc9f0; margin-bottom: 12px; border-bottom: 1px solid #3e3e50; padding-bottom: 5px; }
        .exam-matrix-adaptive { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .exam-matrix-adaptive .student-node { aspect-ratio: 1.3; font-size: 1.2rem; }
        .btn-table-lock { background-color: #4361ee; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-table-lock.locked { background-color: #2a9d8f; }
        .btn-single-del { background-color: #e63946; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; display: none; }
        .teacher-mode .btn-single-del { display: inline-block; }

        /* 📸 全新：生活剪影 Google 相簿網格區 */
        .photo-gallery-container {
            max-width: 1000px; margin: 0 auto; display: none;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;
            padding-bottom: 80px;
        }

        .photo-album-card {
            background: #252530; border-radius: 14px; border: 2px solid #3e3e50;
            overflow: hidden; box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transition: all 0.3s; text-decoration: none; color: white; display: flex; flex-direction: column;
        }
        .photo-album-card:hover {
            transform: translateY(-5px); border-color: #4cc9f0;
            box-shadow: 0 12px 25px rgba(76,201,240,0.3);
        }

        .album-icon-zone {
            background: #313143; height: 120px; display: flex; justify-content: center;
            align-items: center; font-size: 3.5rem;
        }

        .album-info-zone {
            padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between;
        }

        .album-name { font-size: 1.15rem; font-weight: bold; color: #4cc9f0; margin-bottom: 8px; line-height: 1.4; }
        .album-desc { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 12px; }
        .album-action-hint { font-size: 0.9rem; color: #fccc52; font-weight: bold; text-align: right; }

        @keyframes danger-blink {
            0% { opacity: 0.7; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1.05); box-shadow: 0 0 12px #7209b7; }
        }
    </style>
</head>
<body>

    <div class="title-area">
        <h1 id="mainTitle">📋 NICE家族即時親師數位看板</h1>
        <div class="subtitle" id="viewModeHint">正在連線至雲端即時同步資料庫...</div>
        
        <div class="top-tools">
            <div class="parent-search-box" id="searchBoxZone">
                <input type="number" class="search-input" id="searchNo" placeholder="輸入座號" min="1" max="24">
                <button class="btn-search" onclick="searchStudentMissing()">🔍 查找欠交</button>
            </div>
            <button class="btn-clear-all" id="clearAllBtn" onclick="triggerClear()">🧹 清空日常作業</button>
        </div>
    </div>

    <!-- 模式切換：升級為三叉路口 -->
    <div class="mode-tabs">
        <button class="tab-btn active" id="tabDaily" onclick="switchMode('daily')">📁 日常作業消消樂</button>
        <button class="tab-btn" id="tabExam" onclick="switchMode('exam')">📊 學期考試大標靶</button>
        <button class="tab-btn" id="tabPhotos" onclick="switchMode('photos')">📸 NICE家族生活剪影</button>
    </div>

    <!-- 控制台 A：日常作業 -->
    <div class="control-panel" id="controlPanelDaily">
        <select class="select-style" id="taskSelect" onchange="toggleCustomInput()">
            <option value="">-- 請選擇欲掛上的日常作業 --</option>
            <option value="國習">國習</option>
            <option value="預習本">預習本</option>
            <option value="圈詞">圈詞</option>
            <option value="甲本">甲本</option>
            <option value="乙本">乙本</option>
            <option value="聽寫">聽寫</option>
            <option value="字音字形">字音字形</option>
            <option value="默寫">默寫</option>
            <option value="數習">數習</option>
            <option value="數重">數重</option>
            <option value="數作">數作</option>
            <option value="數課">數課</option>
            <option value="CUSTOM">💡 自行輸入新作業</option>
        </select>
        <input type="text" class="input-style" id="customInput" placeholder="請打上新作業名稱" style="display:none;">
        <button class="btn-add" onclick="createNewCard()">＋ 掛上登記板</button>
    </div>

    <!-- 控制台 B：學期考試 -->
    <div class="control-panel" id="controlPanelExam">
        <select class="select-style" id="examSubject">
            <option value="國語">國語</option>
            <option value="數學">數學</option>
            <option value="其他">其他</option>
        </select>
        <input type="text" class="input-style" id="examUnitInput" placeholder="輸入單元名稱 (如: ch1)">
        <button class="btn-add" onclick="addNewExamColumn()">＋ 新增學期考試項目</button>
    </div>

    <div class="loading-hint" id="loadingHint">⏳ 雲端資料同步中，請稍候...</div>
    
    <!-- 分頁一：日常卡片 -->
    <div class="board-canvas" id="boardCanvas"></div>

    <!-- 分頁二：考試大表格 -->
    <div class="exam-mode-container" id="examTableContainer">
        <div class="exam-selector-zone">
            <span class="exam-view-title">🔍 請選擇考試項目：</span>
            <select class="select-style" id="examActiveSelect" onchange="renderExamTable()" style="min-width: 200px;"></select>
            <button class="btn-table-lock" id="btnTableLock" onclick="toggleTableLock()">🔒 鎖定黑板 (隱藏完成)</button>
            <button class="btn-single-del" id="btnSingleDel" onclick="triggerDeleteSingleExam()">🗑️ 刪除此科</button>
        </div>

        <div class="exam-split-layout" id="examSplitLayout">
            <div class="exam-column-box">
                <div class="column-box-title">01 ~ 12 號</div>
                <div class="exam-matrix-adaptive" id="examMatrixLeft"></div>
            </div>
            <div class="exam-column-box">
                <div class="column-box-title">13 ~ 24 號</div>
                <div class="exam-matrix-adaptive" id="examMatrixRight"></div>
            </div>
        </div>
    </div>

    <!-- 📸 分頁三：全新大熊老師 Google 相簿專區 -->
    <div class="photo-gallery-container" id="photoGalleryContainer">
        
        <!-- 💡 相簿卡片範本一：大熊老師可以在這裡自由更換你的 Google 相簿連結 -->
        <a href="https://photos.app.goo.gl/WdnQ8j564PxZdM9P6" target="_blank" class="photo-album-card">
            <div class="album-icon-zone">✨</div>
            <div class="album-info-zone">
                <div>
                    <div class="album-name">露營</div>
                    <div class="album-desc">凝聚了 NICE 家族四個月以來的汗水，點亮夜空的那一刻，回憶無價！</div>
                </div>
                <div class="album-action-hint">進入相簿觀看 ➜</div>
            </div>
        </a>

        <!-- 💡 相簿卡片範本二 -->
        <a href="https://photos.google.com/" target="_blank" class="photo-album-card">
            <div class="album-icon-zone">🏐</div>
            <div class="album-info-zone">
                <div>
                    <div class="album-name">🔥 班級排球對抗賽特輯</div>
                    <div class="album-desc">記錄 NICE 家族在球場上的靈活防守、熱血跳躍與精采得分瞬間！</div>
                </div>
                <div class="album-action-hint">進入相簿觀看 ➜</div>
            </div>
        </a>

        <!-- 💡 相簿卡片範本三 -->
        <a href="https://photos.google.com/" target="_blank" class="photo-album-card">
            <div class="album-icon-zone">⛰️</div>
            <div class="album-info-zone">
                <div>
                    <div class="album-name">👣 戶外健行戶外教育</div>
                    <div class="album-desc">大自然是最棒的教室！看看大家一路上互相扶持、充滿笑容的合照。</div>
                </div>
                <div class="album-action-hint">進入相簿觀看 ➜</div>
            </div>
        </a>

    </div>

    <script>
        const cloudUrl = "https://script.google.com/macros/s/AKfycby60_GyNszlRXQyrJSgvi_zxx4G9swTuDj_jUQeLABa68kwz1R6ag9dWRQHyaW-S2sE/exec";
        const totalStudents = 24;
        let activeCardsData = []; 
        let examRecordsData = [];
        let isTeacher = false;
        let currentMode = 'daily';
        let isTableLocked = false;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'teacher') {
                isTeacher = true;
                updateControlPanelVisibility();
                document.getElementById('clearAllBtn').style.display = 'block';
                document.getElementById('viewModeHint').textContent = '🔒 大熊老師管理模式（修改將即時同步雲端）';
                document.body.classList.add('teacher-mode');
            } else {
                document.getElementById('viewModeHint').textContent = '👁️ 家長/學生即時查閱看板（每 10 秒自動刷新）';
                setInterval(fetchCloudData, 10000); 
            }
            fetchCloudData();
        };

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tabDaily').classList.remove('active');
            document.getElementById('tabExam').classList.remove('active');
            document.getElementById('tabPhotos').classList.remove('active');
            
            const clearBtn = document.getElementById('clearAllBtn');
            const searchBox = document.getElementById('searchBoxZone');

            // 隱藏全部三大區塊
            document.getElementById('boardCanvas').style.display = 'none';
            document.getElementById('examTableContainer').style.display = 'none';
            document.getElementById('photoGalleryContainer').style.display = 'none';

            if (mode === 'daily') {
                document.getElementById('tabDaily').classList.add('active');
                document.getElementById('boardCanvas').style.display = 'grid';
                searchBox.style.display = 'flex';
                clearBtn.style.display = isTeacher ? 'block' : 'none';
                clearBtn.textContent = "🧹 清空日常作業";
                clearBtn.style.backgroundColor = "#e63946";
            } else if (mode === 'exam') {
                document.getElementById('tabExam').classList.add('active');
                document.getElementById('examTableContainer').style.display = 'block';
                searchBox.style.display = 'flex';
                clearBtn.style.display = isTeacher ? 'block' : 'none';
                clearBtn.textContent = "🧹 清空學期考試";
                clearBtn.style.backgroundColor = "#7209b7";
            } else if (mode === 'photos') {
                document.getElementById('tabPhotos').classList.add('active');
                document.getElementById('photoGalleryContainer').style.display = 'grid';
                searchBox.style.display = 'none'; // 相簿不需要搜欠交，隱藏
                clearBtn.style.display = 'none';
            }
            updateControlPanelVisibility();
        }

        function updateControlPanelVisibility() {
            if (!isTeacher) return;
            document.getElementById('controlPanelDaily').style.display = (currentMode === 'daily') ? 'flex' : 'none';
            document.getElementById('controlPanelExam').style.display = (currentMode === 'exam') ? 'flex' : 'none';
        }

        function fetchCloudData() {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);

            fetch(cloudUrl, { signal: controller.signal })
            .then(res => res.json())
            .then(data => {
                clearTimeout(timeoutId);
                document.getElementById('loadingHint').style.display = 'none';
                activeCardsData = data.daily || [];
                const prevSelected = document.getElementById('examActiveSelect').value;
                examRecordsData = data.exam || [];
                updateExamSelectOptions(prevSelected);
                renderBoard();
                renderExamTable();
            }).catch(err => {
                clearTimeout(timeoutId);
                document.getElementById('loadingHint').innerHTML = "⚠️ 提示：目前處於離線快打模式。";
                renderBoard();
                renderExamTable();
            });
        }

        function updateExamSelectOptions(prevSelected) {
            const select = document.getElementById('examActiveSelect');
            select.innerHTML = "";
            if (examRecordsData.length === 0) {
                select.innerHTML = "<option value=''>-- 目前尚無考試項目 --</option>";
                return;
            }
            examRecordsData.forEach(e => {
                const opt = document.createElement('option'); opt.value = e.examName; opt.textContent = e.examName;
                select.appendChild(opt);
            });
            if (prevSelected && examRecordsData.some(e => e.examName === prevSelected)) select.value = prevSelected;
        }

        function pushToCloud(payload) {
            fetch(cloudUrl, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        }

        function bindNodeEvents(btn, s, type, identifier) {
            if (!isTeacher) return;
            let touchTimeout;
            let isLongPress = false;

            const executeExplosion = () => {
                isLongPress = true;
                btn.className = 'student-node exploding';
                setTimeout(() => {
                    btn.dataset.status = 0;
                    btn.className = 'student-node';
                    if (type === 'daily') {
                        const idx = activeCardsData.findIndex(c => c.fullTitle === identifier);
                        if (idx !== -1) { activeCardsData[idx].statusArray[s] = 0; syncDailyCard(idx); }
                    } else if (type === 'exam') {
                        const idx = examRecordsData.findIndex(e => e.examName === identifier);
                        if (idx !== -1) { examRecordsData[idx].statusArray[s] = 0; syncExamColumn(identifier, idx); }
                    }
                }, 400);
            };

            btn.onmousedown = (e) => { isLongPress = false; touchTimeout = setTimeout(executeExplosion, 800); };
            btn.onmouseup = () => clearTimeout(touchTimeout);
            btn.onmouseleave = () => clearTimeout(touchTimeout);
            btn.ontouchstart = (e) => { isLongPress = false; touchTimeout = setTimeout(executeExplosion, 800); };
            btn.ontouchend = () => clearTimeout(touchTimeout);

            btn.onclick = () => {
                if (isLongPress) { isLongPress = false; return; }
                const pNode = btn.parentNode.parentNode;
                if (pNode.classList.contains('hide-green-mode') && !btn.classList.contains('status-1') && !btn.classList.contains('status-2') && !btn.classList.contains('status-3')) return;

                let status = (parseInt(btn.dataset.status) + 1) % 4;
                btn.dataset.status = status;

                if (type === 'daily') {
                    const idx = activeCardsData.findIndex(c => c.fullTitle === identifier);
                    if (idx !== -1) { activeCardsData[idx].statusArray[s] = status; syncDailyCard(idx); }
                } else if (type === 'exam') {
                    const idx = examRecordsData.findIndex(e => e.examName === identifier);
                    if (idx !== -1) { examRecordsData[idx].statusArray[s] = status; syncExamColumn(identifier, idx); }
                }
                btn.className = 'student-node';
                if (status > 0) btn.classList.add(`status-${status}`);
            };
        }

        function syncDailyCard(idx) {
            pushToCloud({ action: "saveOrUpdate", fullTitle: activeCardsData[idx].fullTitle, pureName: activeCardsData[idx].pureName, statusArray: activeCardsData[idx].statusArray, isLocked: activeCardsData[idx].isLocked });
            checkCardCompletion(idx);
        }

        function syncExamColumn(examName, idx) {
            pushToCloud({ action: "saveExam", examName: examName, statusArray: examRecordsData[idx].statusArray });
        }

        function renderBoard() {
            const canvas = document.getElementById('boardCanvas'); canvas.innerHTML = ""; 
            activeCardsData.forEach(cardData => {
                const card = document.createElement('div'); card.className = 'homework-card'; card.id = `card_${cardData.fullTitle}`;
                if (cardData.isLocked || !isTeacher) card.classList.add('hide-green-mode');

                const header = document.createElement('div'); header.className = 'card-header';
                const title = document.createElement('div'); title.className = 'card-title'; title.textContent = cardData.fullTitle;

                const actionsWrapper = document.createElement('div'); actionsWrapper.className = 'header-actions';
                const lockBtn = document.createElement('button'); lockBtn.className = 'btn-lock'; lockBtn.textContent = cardData.isLocked ? '🔓 解鎖' : '🔒 鎖定';
                if (cardData.isLocked) lockBtn.classList.add('locked');
                if (isTeacher) lockBtn.style.display = 'block';
                
                lockBtn.onclick = () => {
                    cardData.isLocked = !cardData.isLocked;
                    pushToCloud({ action: "saveOrUpdate", fullTitle: cardData.fullTitle, pureName: cardData.pureName, statusArray: cardData.statusArray, isLocked: cardData.isLocked });
                    renderBoard();
                };

                const delBtn = document.createElement('button'); delBtn.className = 'btn-delete'; delBtn.innerHTML = '🗑️';
                if (isTeacher) delBtn.style.display = 'block';
                delBtn.onclick = () => removeCard(cardData.fullTitle);

                actionsWrapper.appendChild(lockBtn); actionsWrapper.appendChild(delBtn); header.appendChild(title); header.appendChild(actionsWrapper); card.appendChild(header);

                const matrix = document.createElement('div'); matrix.className = 'student-matrix';
                for (let s = 1; s <= totalStudents; s++) {
                    const btn = document.createElement('button'); btn.className = 'student-node'; btn.textContent = s;
                    const currentStatus = cardData.statusArray[s] || 0;
                    btn.dataset.status = currentStatus;
                    if (currentStatus > 0) btn.classList.add(`status-${currentStatus}`);
                    bindNodeEvents(btn, s, 'daily', cardData.fullTitle);
                    matrix.appendChild(btn);
                }
                card.appendChild(matrix); canvas.appendChild(card);
            });
        }

        function renderExamTable() {
            const leftMatrix = document.getElementById('examMatrixLeft'); const rightMatrix = document.getElementById('examMatrixRight');
            const layoutBox = document.getElementById('examSplitLayout');
            leftMatrix.innerHTML = ""; rightMatrix.innerHTML = "";

            const activeExamName = document.getElementById('examActiveSelect').value;
            if (!activeExamName) return;

            const examData = examRecordsData.find(e => e.examName === activeExamName);
            const statusArray = examData ? examData.statusArray : Array(totalStudents + 1).fill(0);

            if (isTableLocked || !isTeacher) { layoutBox.classList.add('hide-green-mode'); } 
            else { layoutBox.classList.add('hide-green-mode'); if(isTeacher) layoutBox.classList.remove('hide-green-mode'); }

            for (let s = 1; s <= totalStudents; s++) {
                const btn = document.createElement('button'); btn.className = 'student-node'; btn.textContent = String(s).padStart(2, '0');
                const currentStatus = statusArray[s] || 0;
                btn.dataset.status = currentStatus;
                if (currentStatus > 0) btn.classList.add(`status-${currentStatus}`);
                bindNodeEvents(btn, s, 'exam', activeExamName);
                if (s <= 12) { leftMatrix.appendChild(btn); } else { rightMatrix.appendChild(btn); }
            }
        }

        function toggleTableLock() {
            isTableLocked = !isTableLocked;
            const btn = document.getElementById('btnTableLock');
            btn.textContent = isTableLocked ? "🔓 解鎖表格 (顯示全班)" : "🔒 鎖定表格 (隱藏完成)";
            if (isTableLocked) btn.classList.add('locked'); else btn.classList.remove('locked');
            renderExamTable();
        }

        function createNewCard() {
            if (!isTeacher) return;
            const select = document.getElementById('taskSelect'); const customInput = document.getElementById('customInput');
            let pureTaskName = (select.value === "CUSTOM") ? customInput.value.trim() : select.value;
            if (!pureTaskName) { alert("大熊老師，請先選擇作業名稱喔！"); return; }
            
            const today = new Date();
            const newFullTitle = `${pureTaskName} ${today.getMonth() + 1}/${today.getDate()}`;
            if (activeCardsData.some(c => c.fullTitle === newFullTitle)) { alert(`🚨 防呆：今天已有「${newFullTitle}」囉！`); return; }

            let advancedStatus = Array(totalStudents + 1).fill(0); 
            let oldCard = [...activeCardsData].reverse().find(c => c.pureName === pureTaskName);
            if (oldCard) {
                for (let s = 1; s <= totalStudents; s++) {
                    let oldStatus = oldCard.statusArray[s] || 0;
                    if (oldStatus === 1) advancedStatus[s] = 2;
                    else if (oldStatus === 2 || oldStatus === 3) advancedStatus[s] = 3;
                }
                activeCardsData = activeCardsData.filter(c => c.fullTitle !== oldCard.fullTitle);
                pushToCloud({ action: "delete", fullTitle: oldCard.fullTitle });
            }

            activeCardsData.push({ fullTitle: newFullTitle, pureName: pureTaskName, statusArray: advancedStatus, isLocked: false });
            renderBoard();
            pushToCloud({ action: "saveOrUpdate", fullTitle: newFullTitle, pureName: pureTaskName, statusArray: advancedStatus, isLocked: false });
            select.value = ""; customInput.value = ""; customInput.style.display = "none";
        }

        function addNewExamColumn() {
            if (!isTeacher) return;
            const subject = document.getElementById('examSubject').value;
            const unit = document.getElementById('examUnitInput').value.trim();
            if (!unit) { alert("請填寫單元名稱！"); return; }
            const fullExamName = `${subject}-${unit}`;

            if (examRecordsData.some(e => e.examName === fullExamName)) { alert("已有此考試項目！"); return; }
            const initialStatus = Array(totalStudents + 1).fill(0);
            examRecordsData.push({ examName: fullExamName, statusArray: initialStatus });
            
            updateExamSelectOptions(fullExamName); renderExamTable();
            pushToCloud({ action: "saveExam", examName: fullExamName, statusArray: initialStatus });
            document.getElementById('examUnitInput').value = "";
        }

        function triggerDeleteSingleExam() {
            const activeExamName = document.getElementById('examActiveSelect').value;
            if (!activeExamName) return;
            if (confirm(`確定要徹底刪除「${activeExamName}」嗎？`)) {
                examRecordsData = examRecordsData.filter(e => e.examName !== activeExamName);
                updateExamSelectOptions(""); renderExamTable();
                pushToCloud({ action: "deleteExam", examName: activeExamName });
            }
        }

        function triggerClear() {
            if (currentMode === 'daily') {
                if(confirm("確定要清空目前大螢幕上「所有日常作業小卡」嗎？")) {
                    document.getElementById('boardCanvas').innerHTML = ""; activeCardsData = [];
                    pushToCloud({ action: "clearDaily" }); 
                }
            } else {
                if(confirm("⚠ 注意：確定要將一整學期累積的「所有考試項目」全部清空重置嗎？")) {
                    examRecordsData = []; updateExamSelectOptions(""); renderExamTable();
                    pushToCloud({ action: "clearExam" }); 
                }
            }
        }

        function searchStudentMissing() {
            const inputEl = document.getElementById('searchNo'); const seatNo = parseInt(inputEl.value);
            if (isNaN(seatNo) || seatNo < 1 || seatNo > totalStudents) { alert("請輸入正確座號（1 ~ 24）"); return; }

            let dailyMissing = []; let examMissing = [];
            activeCardsData.forEach(card => { if (card.statusArray[seatNo] > 0) dailyMissing.push(`📌 ${card.fullTitle}`); });
            examRecordsData.forEach(exam => {
                if (exam.statusArray[seatNo] > 0) {
                    let levelText = (exam.statusArray[seatNo] === 1) ? "(未補考)" : (exam.statusArray[seatNo] === 2) ? "(延遲)" : "(⚠️釘子戶)";
                    examMissing.push(`📝 ${exam.examName} ${levelText}`);
                }
            });

            if (dailyMissing.length === 0 && examMissing.length === 0) { alert(`🎉 恭喜！【 ${seatNo} 號】目前全部過關！`); } 
            else {
                let report = `📋 【 ${seatNo} 號】未完成訂正報告：\n`;
                if (dailyMissing.length > 0) report += `\n【📁 日常作業類】\n${dailyMissing.join('\n')}\n`;
                if (examMissing.length > 0) report += `\n【📊 學期考試類】\n${examMissing.join('\n')}\n`;
                alert(report);
            }
        }

        function toggleCustomInput() {
            const select = document.getElementById('taskSelect'); const customInput = document.getElementById('customInput');
            customInput.style.display = (select.value === "CUSTOM") ? "inline-block" : "none";
            if (select.value === "CUSTOM") customInput.focus();
        }

        function checkCardCompletion(cardIndex) {
            const cardData = activeCardsData[cardIndex]; if (!cardData) return;
            const isAllGreen = cardData.statusArray.slice(1, totalStudents + 1).every(status => status === 0);
            if (isAllGreen) {
                const targetTitle = cardData.fullTitle; const cardElement = document.getElementById(`card_${targetTitle}`);
                if (cardElement) {
                    cardElement.classList.add('fade-out');
                    setTimeout(() => {
                        cardElement.remove(); activeCardsData = activeCardsData.filter(item => item.fullTitle !== targetTitle);
                        pushToCloud({ action: "delete", fullTitle: targetTitle }); 
                    }, 400);
                }
            }
        }

        function removeCard(fullTitle) {
            if(confirm(`確定要取下「${fullTitle}」嗎？`)) {
                const card = document.getElementById(`card_${fullTitle}`); if (card) card.remove();
                activeCardsData = activeCardsData.filter(item => item.fullTitle !== fullTitle);
                pushToCloud({ action: "delete", fullTitle: fullTitle });
            }
        }
    </script>
</body>
</html>
